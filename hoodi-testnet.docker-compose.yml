services:
  testnet-reth:
    image: ghcr.io/fraxfinance/fraxtal-op-reth:v2.0.0-frax-1.3.2
    ports:
      - 8545:8545
      - 8546:8546
      - 30303:30303/tcp
      - 30303:30303/udp
    entrypoint: ["reth-entrypoint"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"net_version\",\"params\":[],\"id\":1}", "http://localhost:8545"]
      interval: 5s
      timeout: 10s
      retries: 100
    env_file: .env.hoodi-testnet
    volumes:
      - ./hoodi-testnet/data/op-reth:/data
      - ./reth-entrypoint.sh:/bin/reth-entrypoint
  testnet-node:
    image: ghcr.io/fraxfinance/fraxtal-op-node:v1.16.12-frax-1.2.1
    ports:
      - 7545:8545
      - 9222:9222/tcp
      - 9222:9222/udp
    entrypoint: ["node-entrypoint"]
    depends_on:
      testnet-reth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 5s
      timeout: 10s
      retries: 100
    env_file: .env.hoodi-testnet
    volumes:
      - ./hoodi-testnet/rollup.json:/data/rollup.json:ro
      - ./node-entrypoint.sh:/bin/node-entrypoint

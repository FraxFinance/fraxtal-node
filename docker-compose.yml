services:
  mainnet-reth:
    image: ghcr.io/fraxfinance/fraxtal-op-reth:v2.3.1-frax-1.3.4
    ports:
      - 8545:8545
      - 8546:8546
      - 30303:30303/tcp
      - 30303:30303/udp
    entrypoint: ["reth-entrypoint"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"net_version\",\"params\":[],\"id\":1}", "http://localhost:8545"]
      interval: 5s
      timeout: 10s
      retries: 100
    env_file: .env
    volumes:
      - ./mainnet/data/op-reth:/data
      - ./reth-entrypoint.sh:/bin/reth-entrypoint:ro
  mainnet-node-init:
    image: busybox:stable
    command: ["sh", "-c", "echo \"$$OP_ENGINE_API_JWT\" > /data/jwt && cp /rollup.json /data/rollup.json"]
    env_file: .env
    volumes:
      - ./mainnet/data/op-node:/data
      - ./mainnet/rollup.json:/rollup.json:ro
  mainnet-node:
    image: ghcr.io/fraxfinance/fraxtal-op-node:v1.19.0-frax-1.2.1
    ports:
      - 7545:8545
      - 9222:9222/tcp
      - 9222:9222/udp
    entrypoint: ["op-node"]
    depends_on:
      mainnet-reth:
        condition: service_healthy
      mainnet-node-init:
        condition: service_completed_successfully
    env_file: .env
    volumes:
      - ./mainnet/data/op-node:/data
